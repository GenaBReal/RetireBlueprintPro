<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;background:#EEF1F4;font-family:-apple-system,'Segoe UI',system-ui,sans-serif}
.banner{background:repeating-linear-gradient(45deg,#7a1f12,#7a1f12 14px,#8c2a1a 14px,#8c2a1a 28px);color:#fff;text-align:center;padding:13px 16px;font-size:13px;font-weight:800;letter-spacing:.3px;position:sticky;top:0;z-index:10}
.banner small{display:block;font-weight:500;opacity:.92;font-size:11.5px;margin-top:3px}
.lbl{max-width:1080px;margin:22px auto 0;padding:0 8px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#5F6368}</style></head>
<body>
<div class="banner">DESIGN PREVIEW &middot; SAMPLE NUMBERS &mdash; NOT A CLIENT PLAN<small>This file is for reviewing the look only. The live page shows each client&rsquo;s real numbers and stays blank until they load.</small></div>
<div class="lbl">Test 1 &middot; Crash Test</div><iframe id="f1" scrolling="no" style="width:100%;max-width:1080px;margin:14px auto;height:1500px;border:0;display:block;background:#F8F9FA;border-radius:12px;box-shadow:0 6px 24px rgba(4,30,47,.12);overflow:hidden"></iframe>
<script type="text/plain" id="s1"><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test 1 · Crash Test — light prototype</title>
<style>
  :root{ --navy:#041E2F; --navy2:#0A3145; --teal:#1CC7D0; --gold:#f4b86a; --border:#e8eaed;
    --ink:#0B2239; --body:#37474F; --faint:#5F6368; --bg:#F8F9FA; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--body);
    font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;padding:16px}
  .shell{max-width:1120px;margin:0 auto}
  .hero{background:var(--navy);border-bottom:3px solid var(--gold);border-radius:8px 8px 0 0;
    padding:13px 18px;display:flex;align-items:center;gap:12px}
  .hero .tg{background:var(--teal);color:#06303a;font-size:11px;font-weight:800;letter-spacing:1.1px;
    text-transform:uppercase;padding:6px 14px;border-radius:18px}
  .hero h1{color:#fff;font-size:17px;font-weight:800;letter-spacing:.2px}
  .hero .sub{color:#8a9ab0;font-size:11px;font-weight:600;margin-left:auto;text-align:right}
  .grid{display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start;margin-top:14px}
  .decision-full{grid-column:1 / -1}
  .whatif{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:2px}
  @media(max-width:780px){ .grid{grid-template-columns:1fr} body{padding:11px} .whatif{grid-template-columns:1fr} }

  .card{background:#fff;border:1px solid var(--border);border-top:3px solid var(--navy);border-radius:7px;
    padding:15px;box-shadow:0 1px 3px rgba(15,40,60,.05)}
  .seclbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink);
    display:flex;align-items:center;gap:6px;margin-bottom:2px}
  .seclbl::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--teal)}
  .secsub{font-size:10.5px;color:var(--faint);margin:0 0 10px 9px}

  .presets{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 15px}
  .preset{font-size:11px;padding:6px 10px;border-radius:5px;background:#F1F4F6;border:1px solid var(--border);
    color:var(--body);cursor:pointer;user-select:none;font-weight:600}
  .preset.on{border-color:var(--teal);color:var(--navy);background:#e6f8f9}
  .howto{background:#e9f7f8;border:1px solid #bfe7ea;border-left:4px solid var(--teal);border-radius:10px;padding:13px 16px;margin:0 0 16px;font-size:13.5px;line-height:1.55;color:#1f3340}
  .howto .hn{margin-top:6px;color:#46606e;font-size:12.5px}
  .howto b.tl{color:#16AEB6} .howto b.cl{color:#E8745E}

  .sg{margin:13px 0}
  .sl-lab{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink);font-weight:600;margin-bottom:3px}
  .sl-lab .v{font-size:14px;font-weight:800;color:#0E8E96}
  .sl-desc{font-size:10px;color:var(--faint);line-height:1.45;margin-top:4px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:6px;background:#CBD5DC;outline:none;margin:8px 0 2px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#E0A33A;border:3px solid #fff;cursor:pointer;box-shadow:0 1px 5px rgba(4,30,47,.35)}
  input[type=range].teal::-webkit-slider-thumb{background:#0E9CA6}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#E0A33A;border:3px solid #fff;cursor:pointer}
  input[type=range].teal::-moz-range-thumb{background:#0E9CA6}
  .sl-range{display:flex;justify-content:space-between;font-size:9px;color:#90A4AE}

  .late-toggle{display:flex;align-items:center;gap:9px;margin-top:6px;padding-top:13px;border-top:1px solid var(--border);font-size:12px;color:var(--ink);font-weight:600;cursor:pointer;user-select:none}
  .switch{width:36px;height:20px;border-radius:11px;background:#DCE3E8;border:1px solid var(--border);position:relative;flex:none;transition:.15s}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.15s}
  .switch.on{background:rgba(28,199,208,.35);border-color:var(--teal)}.switch.on::after{left:18px}
  .late-body.hide{display:none}
  .yrinput{width:100%;background:#F1F4F6;border:1px solid var(--border);border-radius:5px;color:var(--ink);padding:7px 8px;font-size:12px;font-family:inherit;text-align:center}

  .chart-h{font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--ink);margin-bottom:1px}
  .chart-sub{font-size:10px;color:var(--faint);margin-bottom:9px}
  canvas{display:block;width:100%}#chart{height:236px}#rchart{height:148px}
  .legend{display:flex;flex-wrap:wrap;gap:13px;margin-top:9px;font-size:10px;color:var(--body)}
  .legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .swatch{width:14px;height:3px;border-radius:2px;display:inline-block}
  .swatch.dash{height:0;border-top:2px dashed var(--gold);width:15px}
  .swatch.band{height:11px;width:11px;border-radius:3px;background:rgba(192,57,43,.18)}
  .mb14{margin-bottom:14px}

  .verdict{font-size:13px;line-height:1.5;color:var(--ink);margin:0 0 15px;padding:11px 13px;border-radius:7px;background:#EAF8F9;border-left:4px solid var(--teal)}
  .verdict.bad{background:#FBEFEC;border-left-color:#C0392B}
  .gauge{margin-bottom:15px}
  .glabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .glabel .t{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);font-weight:700}
  .glabel .r{font-size:14px;font-weight:800;color:var(--ink)}
  .chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px}
  .chip.ok{color:#0A7E84;background:#def6f4}
  .chip.no{color:#B0392B;background:#fbe3de}
  .ftrack{position:relative;height:9px;border-radius:5px;background:#ECEFF1;border:1px solid var(--border)}
  .ffill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .15s,background .15s}
  .fres{position:absolute;top:-4px;bottom:-4px;width:2px;background:#90A4AE}
  .fcap{font-size:11px;color:var(--faint);margin-top:9px}

  .safetile{background:var(--navy);border-radius:7px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 17px}
  .safetile .k{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
  .safetile .k b{display:block;color:#cdd9e3;font-size:11px;font-weight:600;text-transform:none;letter-spacing:0;margin-top:3px}
  .safetile .v{font-size:30px;font-weight:800;color:#fff;line-height:1}
  .safetile .v small{font-size:13px;font-weight:600;color:#8a9ab0}

  .track{position:relative;height:32px;border-radius:6px;background:#ECEFF1;overflow:hidden;border:1px solid var(--border)}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px 0 0 6px;transition:width .15s,background .15s}
  .goalmark{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--navy);z-index:3}
  .goalmark::after{content:attr(data-l);position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--body);white-space:nowrap;font-weight:700}
  .barcap{font-size:11.5px;margin-top:19px}
  .ctrl{background:#F6F8FA;border:1px solid var(--border);border-radius:7px;padding:13px;margin-top:11px}
  .ctrlhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
  .ctrlhead .k{font-size:12px;color:var(--body);font-weight:600}.ctrlhead .v{font-size:16px;font-weight:800}
  .green{color:#2E7032}.coral{color:#C0392B}.teal{color:#0E8E96}.gold{color:#C98322}.mut{color:var(--faint)}
  .mb16{margin-bottom:16px}
  .planfacts{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:10px;margin-bottom:13px}
  .pf{background:#F6F8FA;border:1px solid var(--border);border-radius:7px;padding:10px 12px}
  .pf-k{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#0A7E84}
  .pf-v{font-size:19px;font-weight:800;color:var(--ink);line-height:1.1;margin-top:3px}
  .pf-v small{font-size:11px;font-weight:600;color:var(--faint)}
  .pf-s{font-size:9.5px;color:var(--faint);margin-top:3px;line-height:1.35}
  .debtnote{font-size:11px;line-height:1.5;color:#7a5a1e;background:#fbf3e3;border:1px solid #f0dcb8;border-radius:7px;padding:9px 12px;margin-bottom:16px}
  .swatch.sq{height:11px;width:11px;border-radius:3px}
  .foot{font-size:10.5px;color:#90A4AE;margin-top:15px;text-align:center;line-height:1.5}

  /* ── dark decision panel (left column, fills the blank space) ── */
  .leftcol{display:flex;flex-direction:column;gap:14px}
  .decide{background:linear-gradient(165deg,#06243a,#0A3145);border-radius:8px;border-top:3px solid var(--gold);padding:16px 16px 17px;box-shadow:0 6px 22px rgba(4,30,47,.20)}
  .d-head{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#7ecfda;margin-bottom:13px}
  .d-must{margin-bottom:14px}
  .d-must-lbl{font-size:8.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:#f4b86a;margin-bottom:4px}
  .d-must-v{font-size:33px;font-weight:800;color:#fff;line-height:1}
  .d-must-v small{font-size:14px;font-weight:600;color:#8a9ab0}
  .d-must-s{font-size:9.5px;color:#9fc1d6;margin-top:5px;line-height:1.45}
  .d-extra{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:11px 12px;margin-bottom:13px}
  .d-extra-h{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:#cdd9e3;font-weight:600;margin-bottom:1px}
  .d-extra-h b{font-size:15px;font-weight:800;color:#f4b86a}
  .d-extra input[type=range]{background:#0c3346;margin:9px 0 4px}
  .d-extra input[type=range]::-webkit-slider-thumb{background:#E0A33A}
  .d-extra input[type=range]::-moz-range-thumb{background:#E0A33A}
  .d-extra-n{font-size:9.5px;color:#9fc1d6;line-height:1.4}
  .d-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:13px}
  .d-kpi{background:rgba(255,255,255,.05);border-radius:7px;padding:9px 6px;text-align:center}
  .dk-k{font-size:7.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#8fb4c4;margin-bottom:4px;line-height:1.2}
  .dk-v{font-size:16px;font-weight:800;color:#fff;line-height:1}
  .dk-v.gold{color:#f4b86a}.dk-v.teal{color:#3fd0d8}.dk-v.coral{color:#ff7a5e}
  .dk-s{font-size:7.5px;color:#7e9bab;margin-top:4px;line-height:1.25}
  .d-verdict{font-size:11.5px;line-height:1.55;color:#dceef2;background:rgba(28,199,208,.1);border-left:3px solid var(--teal);border-radius:6px;padding:10px 12px}
  .d-verdict.bad{background:rgba(192,57,43,.16);border-left-color:#ff7a5e}
  .d-verdict b{font-weight:800}
</style>
</head>
<body>
<div class="shell">
  <div id="loading" style="padding:48px 16px;text-align:center;color:#5F6368;font-size:13px">Loading your saved plan\u2026<br><span style="font-size:11px;color:#90A4AE">If this stays, hit <b>Reload</b> at the top of the page.</span></div>
  <div id="t1body" style="display:none">
  <div class="hero"><div class="tg">Test 1 · Crash Test</div><h1>What a crash does to your plan</h1><div class="sub" id="heroSub">your saved plan<br>real engine · instant</div></div>

  <div class="howto">
    <div><b>How to read this:</b> the <b class="tl">teal line</b> is your plan exactly as it stands. The <b class="cl">coral line</b> is that same plan after a market crash.</div>
    <div class="hn">Showing <b id="howNow">a 2008-style crash the year you retire</b>. Tap a different crash below to switch it — or drag a slider to build your own.</div>
  </div>

  <div class="grid">
    <!-- LEFT -->
    <div class="leftcol">
    <div class="card">
      <div class="seclbl">Pick a crash to test</div>
      <div class="presets" id="presets">
        <div class="preset on" data-p="custom">Custom</div>
        <div class="preset" data-p="c2008">2008</div>
        <div class="preset" data-p="dotcom">Dot-Com</div>
        <div class="preset" data-p="covid">COVID</div>
        <div class="preset" data-p="stag">1970s</div>
        <div class="preset" data-p="bull">Bull</div>
      </div>
      <div class="sg">
        <div class="sl-lab"><span>Early crash — year-1 return</span><span class="v" id="v-yr1">0%</span></div>
        <input type="range" id="yr1" min="-50" max="30" step="1" value="0">
        <div class="sl-range"><span>−50%</span><span>0%</span><span>+30%</span></div>
        <div class="sl-desc">A crash in your first retirement year is the worst case — you sell at the bottom to live on.</div>
      </div>
      <div class="sg">
        <div class="sl-lab"><span>…lasting</span><span class="v" id="v-yrs">1 yr</span></div>
        <input type="range" id="yrs" min="1" max="5" step="1" value="1">
        <div class="sl-range"><span>1 yr</span><span>3 yrs</span><span>5 yrs</span></div>
      </div>
      <div class="sg">
        <div class="sl-lab"><span>Inflation</span><span class="v" id="v-inf">2.5%</span></div>
        <input type="range" id="inf" min="1" max="10" step="0.1" value="2.5">
        <div class="sl-range"><span>1%</span><span>5%</span><span>10%</span></div>
      </div>
      <div class="sg">
        <div class="sl-lab"><span>Social Security COLA</span><span class="v" id="v-cola">2.5%</span></div>
        <input type="range" id="cola" min="0" max="5" step="0.1" value="2.5">
        <div class="sl-range"><span>0%</span><span>2.5%</span><span>5%</span></div>
        <div class="sl-desc">0% models a worst-case Social Security reform.</div>
      </div>
      <div class="sg">
        <div class="sl-lab"><span>Spending vs plan</span><span class="v" id="v-spend">0%</span></div>
        <input type="range" id="spendadj" min="-30" max="20" step="5" value="0">
        <div class="sl-range"><span>−30%</span><span>0%</span><span>+20%</span></div>
        <div class="sl-desc">Your most powerful lever in a downturn.</div>
      </div>
      <div class="late-toggle" id="lateTog"><span class="switch" id="lateSw"></span><span>Add a second crash later in retirement</span></div>
      <div class="late-body hide" id="lateBody">
        <div class="sg" style="margin-top:6px"><div class="sl-lab"><span>Starts (year)</span></div><input class="yrinput" id="lt-start" type="number" value="2045"></div>
        <div class="sg"><div class="sl-lab"><span>Year-1 return</span><span class="v" id="v-ltret">−20%</span></div><input type="range" id="lt-ret" min="-50" max="10" step="1" value="-20"></div>
        <div class="sg"><div class="sl-lab"><span>…lasting</span><span class="v" id="v-ltyrs">2 yrs</span></div><input type="range" id="lt-yrs" min="1" max="5" step="1" value="2"></div>
      </div>
    </div>

    <!-- DARK DECISION PANEL — fills the blank space under the sliders -->
    <div class="decide" id="decide">
      <div class="d-head">Your decision · in this crash</div>
      <div class="d-must">
        <div class="d-must-lbl">Your must-haves · all-in, taxes included</div>
        <div class="d-must-v" id="d-must">$—<small>/yr</small></div>
        <div class="d-must-s">living · healthcare · debt · taxes — the whole bill you can&rsquo;t skip</div>
      </div>
      <div class="d-extra">
        <div class="d-extra-h"><span>Extra spend on top</span><b id="d-extraV">$0/yr</b></div>
        <input type="range" id="d-extra" min="0" max="120" step="1" value="0">
        <div class="d-extra-n" id="d-extraN">drag to spend more now — watch your legacy move</div>
      </div>
      <div class="d-kpis">
        <div class="d-kpi"><div class="dk-k">Safe to add</div><div class="dk-v gold" id="d-safe">$—</div><div class="dk-s">still hits legacy</div></div>
        <div class="d-kpi"><div class="dk-k">Survives?</div><div class="dk-v teal" id="d-surv">—</div><div class="dk-s" id="d-surv-s">stays above safety floor</div></div>
        <div class="d-kpi"><div class="dk-k">Legacy left</div><div class="dk-v teal" id="d-leg">$—</div><div class="dk-s" id="d-leg-s">vs your goal</div></div>
      </div>
      <div class="d-verdict" id="d-verdict">—</div>
    </div>
    </div><!-- /leftcol -->

    <!-- RIGHT -->
    <div>
      <div class="card mb16">
        <div class="chart-h">Portfolio over time — base plan vs. this scenario</div>
        <div class="chart-sub">every year through the plan, with the legacy goal marked</div>
        <canvas id="chart"></canvas>
        <div class="legend">
          <i><span class="swatch" style="background:#16AEB6"></span>Base plan</i>
          <i><span class="swatch" id="leg-stress" style="background:var(--salmon)"></span>This scenario</i>
          <i><span class="swatch dash"></span>Legacy goal</i>
          <i><span class="swatch" style="height:0;border-top:2px dotted #8499A8;width:15px"></span>Account floor</i>
          <i><span class="swatch band"></span>Crash years</i>
        </div>
      </div>

      <div class="card mb16">
        <div class="chart-h">Return each year — the sequence your plan must survive</div>
        <div class="chart-sub">crash years drop into the warm colors; deeper crash = warmer</div>
        <canvas id="rchart"></canvas>
      </div>

      <div class="card mb16">
        <div class="chart-h">Your spending vs. the most you can safely spend</div>
        <div class="chart-sub">one rule — stay under the dashed line. green is room to spare; red is the cut you'd need, in dollars.</div>
        <canvas id="wchart"></canvas>
        <div class="legend">
          <i><span class="swatch sq" style="background:rgba(28,199,208,.30)"></span>Essentials</i>
          <i><span class="swatch" style="background:var(--navy);height:3px"></span>You plan to spend</i>
          <i><span class="swatch" style="height:0;border-top:2px dashed #0A7E84;width:15px"></span>Safe-to-spend ceiling</i>
          <i><span class="swatch sq" style="background:rgba(70,200,150,.45)"></span>Room to spare</i>
          <i><span class="swatch sq" style="background:rgba(192,57,43,.4)"></span>Overspending</i>
        </div>
      </div>

    </div><!-- /RIGHT col (charts) -->

    <div class="card decision-full">
        <div class="seclbl">Your plan — what everything is measured against</div>
        <div class="planfacts" style="margin-top:11px">
          <div class="pf"><div class="pf-k">Essentials · every year</div><div class="pf-v" id="factFloor">$118K<small>/yr</small></div><div class="pf-s" id="factFloorBreak">living · healthcare · debt</div></div>
          <div class="pf"><div class="pf-k">Account floor</div><div class="pf-v" id="factReserve">$150K</div><div class="pf-s">balance can\u2019t drop below this</div></div>
          <div class="pf"><div class="pf-k">Legacy goal</div><div class="pf-v" id="factLegacy">$1.00M</div><div class="pf-s">to leave behind</div></div>
        </div>
        <div class="debtnote" id="debtNote"></div>
        <div class="verdict" id="verdict">…</div>
        <div class="gauge">
          <div class="glabel"><span class="t">Account floor · balance stays above this</span><span class="chip ok" id="floorChip">Stays above</span></div>
          <div class="ftrack"><div class="ffill" id="ffill"></div><div class="fres" id="fres" style="left:25%"></div></div>
          <div class="fcap" id="fcap">lowest balance stays above your reserve</div>
        </div>
        <div class="safetile">
          <div class="k">Guilt-free extra / yr<b id="safeNote">and still leave your full legacy</b></div>
          <div class="v" id="safeAmt">$30K<small>/yr</small></div>
        </div>
        <div class="gauge">
          <div class="glabel"><span class="t">Legacy you'd leave</span><span class="r" id="legR">$1.00M</span></div>
          <div class="track"><div class="fill" id="legFill"></div><div class="goalmark" id="goalMark" data-l="goal" style="left:40%"></div></div>
          <div class="barcap" id="legCap">right on your goal</div>
        </div>
        <div class="whatif">
        <div class="ctrl">
          <div class="ctrlhead"><span class="k">If you spent this much extra…</span><span class="v gold" id="spendVal">$30K/yr</span></div>
          <input type="range" id="spend" min="0" max="120" step="1" value="30">
          <div class="sl-range" id="spendScale"><span>$0</span><span>$60K</span><span>$120K</span></div>
          <div class="fcap" id="spendNote" style="margin-top:8px">you're right at the safe line</div>

        <div class="ctrl">
          <div class="ctrlhead"><span class="k">If you'd accept leaving less legacy…</span><span class="v teal" id="goalVal">$1.00M</span></div>
          <input type="range" class="teal" id="goal" min="50" max="150" step="5" value="100">
          <div class="sl-range" id="goalScale"><span>$0.5M</span><span>$1.0M</span><span>$1.5M</span></div>
          <div class="fcap" id="goalNote" style="margin-top:8px">guilt-free extra becomes <b class="gold" id="safeAtGoal">$30K/yr</b></div>
        </div>
        </div><!-- /whatif -->
      </div><!-- /decision card -->
  </div>
  <p class="foot">Every figure is computed live from your saved plan \u2014 taxes, RMDs, and Social Security timing included. Nothing here changes your saved data.</p>
  </div>
</div>

<script>
/* ============================================================================
 * RetireBlueprint Pro — Engine  (rbp-engine.js)  · SINGLE SOURCE OF TRUTH
 * ----------------------------------------------------------------------------
 * One shared, full-precision engine for every page. No $500 rounding, no
 * estimated tax margins — taxes are computed exactly inside the projection.
 *
 *   RBP.project(I, opts)        → year-by-year rows (the Master array, ported)
 *   RBP.solveSafeExtra(I)       → max safe extra spend (honest binary search)
 *   RBP.runStress(I, params)    → crash scenario: ending / hit / crossover /
 *                                 re-solved safe extra / full series
 *   RBP.buildI(payload, D)      → map a connector input payload → engine input I
 *
 * Validated to the dollar against the live Google Sheet: base case (all cash-
 * flow columns exact, balances within 0.005%) and the full crash ladder
 * (ending, hit, AND crossover year exact, −10% through −40%).
 * ==========================================================================*/
function gs15(x){ if(!isFinite(x)||x===0)return x; var d=Math.ceil(Math.log10(Math.abs(x))); var p=15-d; var f=Math.pow(10,p); return Math.round(x*f)/f; }
function gsR(x){ x=gs15(x); return x<0?-Math.round(-x):Math.round(x); }
function rbpProject(I, opts) {
  opts = opts || {};
  const yOf = d => (d ? new Date(d).getFullYear() : null);
  const mOf = d => (d ? new Date(d).getMonth() + 1 : null);
  const startYear = yOf(I.planStart), pm = mOf(I.planStart), pd = new Date(I.planStart).getDate();

  const gLife = (I.p1_lifeEnd - I.p1_ageStart) || 0;     // var_G_Life  (col-B person)
  const cLife = (I.p2_lifeEnd - I.p2_ageStart) || 0;     // var_C_Life  (col-D person)
  // Run THROUGH the entered death-age year for the longest-lived person (not one year short).
  // Age is stamped at year-start, so a death age of 102 needs (102-currentAge)+1 rows for the final
  // row to read 102. MUST stay in lockstep with the sheet's var_Duration = MIN(var_Max_Duration+1,111).
  const duration = Math.min(Math.max(gLife, cLife) + 1, 111);

  // Tax Engine tables
  const TB = I.taxBrackets, TR = I.taxRates;             // length 7 (C8:C14 / D8:D14)
  const TRDiff = TR.map((r,i) => r - (i ? TR[i-1] : 0)); // var_Tax_Rate_Diffs
  const LTCG_B = [0, 94050, 583750], LTCG_R = [0, 0.15, 0.20];

  // accounts (length 12)
  const A = I.accounts; // {statusA, statusG, type, name, start, rate, basis, contrib, match, cStart, cEnd, wStart}
  const nameL = s => String(s||'').toLowerCase().trim();
  const n1 = nameL(I.name1), n2 = nameL(I.name2);
  const owner = A.map(a => {
    const ow = nameL(a.owner);          // Owner column (C): partner name or "Joint"
    if (n1 && ow.includes(n1)) return 1;  // → partner 1 (Craig)
    if (n2 && ow.includes(n2)) return 2;  // → partner 2 (Gena)
    return 0;                              // Joint / blank → unattributed (matches Sheet)
  });
  const incYes = A.map(a => nameL(a.statusA) === 'yes');
  const rate = A.map(a => (a.rate||0));                 // already decimal
  const startBal = A.map((a,i) => (a.start||0) * (incYes[i]?1:0));
  const typeL = A.map(a => nameL(a.type));
  const hier = typeL.map(t => t.includes('taxable')?1 : t.includes('pre')?2 : t.includes('roth')?3 : 99);
  const gUnlock = I.p1_unlock ? yOf(I.p1_unlock) : startYear;
  const cUnlock = I.p2_unlock ? yOf(I.p2_unlock) : startYear;
  const acctUnlock = A.map((a,i) => a.wStart ? yOf(a.wStart) : (owner[i]===1?gUnlock : owner[i]===2?cUnlock : startYear));

  const taxBasisInit = A.reduce((s,a,i)=> s + ((hier[i]===1 && incYes[i]) ? (a.basis||0) : 0), 0);

  // window proration helper: income active fraction for [S,E] in year yr (matches the IF ladders)
  function annualFrac(yr, S, E, startInclusive) {
    // mirrors the pension/other LET windows
    if (!S) return startInclusive ? 1 : 0;
    const ys = yOf(S);
    if (yr < ys) return 0;
    if (!E) return (yr===ys) ? (13-mOf(S))/12 : 1;
    const ye = yOf(E);
    if (yr > ye) return 0;
    if (ys===ye) return (mOf(E)-mOf(S)+1)/12;
    if (yr===ys) return (13-mOf(S))/12;
    if (yr===ye) return mOf(E)/12;
    return 1;
  }
  // OTHER income window — mirrors the sheet's var_*_Oth EXACTLY, including its quirk that a blank
  // end date reads as YEAR(blank)=1899, so any plan year is "after" it and the income becomes 0.
  function otherFrac(yr, S, E) {
    if (!S) return 0;
    const ys = yOf(S);
    if (yr < ys) return 0;
    if (!E) return 0;                         // blank end date -> 0 (matches the sheet)
    const ye = yOf(E);
    if (yr > ye) return 0;
    if (ys === ye) return (mOf(E)-mOf(S)+1)/12;
    if (yr === ys) return (13-mOf(S))/12;
    if (yr === ye) return mOf(E)/12;
    return 1;
  }
  const bracketTax = (taxable, brackets) =>
    brackets.reduce((s,b,i)=> s + (taxable>b ? (taxable-b)*TRDiff[i] : 0), 0);
  const xlookupRate = (x, B, R) => { let r=R[0]; for(let i=0;i<B.length;i++){ if(x>=B[i]) r=R[i]; } return r; };

  let prevBals = startBal.slice(), prevBasis = taxBasisInit;
  const rows = [];

  for (let k=0; k<duration; k++) {
    const yr = startYear + k, idx = yr - startYear;

    // contributions
    const cActive = A.map((a,i)=> (a.contrib>0) *
      (a.cStart? (yr>=yOf(a.cStart)?1:0):1) * (a.cEnd? (yr<=yOf(a.cEnd)?1:0):1) * (incYes[i]?1:0));
    const cPro = A.map((a)=> (a.cStart? (yOf(a.cStart)===yr? (13-mOf(a.cStart))/12 : 1):1) *
      (a.cEnd? (yOf(a.cEnd)===yr? mOf(a.cEnd)/12 : 1):1));
    const contribAmt = A.map((a,i)=> Math.round((a.contrib||0)*cActive[i]*cPro[i]));
    const matchAmt   = A.map((a,i)=> Math.round((a.match||0)*cActive[i]*cPro[i]));
    const sp = (arr,m)=> arr.reduce((s,v,i)=> s + v*(m[i]?1:0), 0);
    const craigContrib = Math.round(sp(contribAmt, owner.map(o=>o===1)));
    const craigMatch   = Math.round(sp(matchAmt,   owner.map(o=>o===1)));
    const genaContrib  = Math.round(sp(contribAmt, owner.map(o=>o===2)));
    const genaMatch    = Math.round(sp(matchAmt,   owner.map(o=>o===2)));
    const totalContrib = craigContrib+craigMatch+genaContrib+genaMatch;

    const gDeath = startYear+gLife, cDeath = startYear+cLife;
    const gAlive = yr<=gDeath, cAlive = yr<=cDeath;
    const craigAge = I.p1_ageStart+idx, genaAge = I.p2_ageStart+idx;

    const gSal = gAlive ? I.p1_salary*(!I.p1_salEnd?1:(yr<yOf(I.p1_salEnd)?1:(yr===yOf(I.p1_salEnd)?mOf(I.p1_salEnd)/12:0))) : 0;
    const ssFrac = (start)=> !start?1:(yr<yOf(start)?0:(yr===yOf(start)?(13-mOf(start))/12:1));
    const gProjSS = I.p1_ssMonthly*12*ssFrac(I.p1_ssStart)*Math.pow(1+I.inflSS, idx);
    const cProjSS = I.p2_ssMonthly*12*ssFrac(I.p2_ssStart)*Math.pow(1+I.inflSS, idx);
    const gSS = gAlive ? ((!cAlive && craigAge>=60) ? Math.max(gProjSS,cProjSS) : gProjSS) : 0;
    const cSS = cAlive ? ((!gAlive && genaAge>=60)  ? Math.max(cProjSS,gProjSS) : cProjSS) : 0;
    const gPen = gAlive ? I.p1_pension*12*annualFrac(yr, I.p1_penStart, I.p1_penEnd, true) : 0;
    const gOth = gAlive ? I.p1_other*otherFrac(yr, I.p1_othStart, I.p1_othEnd) : 0;
    const cSal = cAlive ? I.p2_salary*(!I.p2_salEnd?1:(yr<yOf(I.p2_salEnd)?1:(yr===yOf(I.p2_salEnd)?mOf(I.p2_salEnd)/12:0))) : 0;
    const cPen = cAlive ? I.p2_pension*12*annualFrac(yr, I.p2_penStart, I.p2_penEnd, true) : 0;
    const cOth = cAlive ? I.p2_other*otherFrac(yr, I.p2_othStart, I.p2_othEnd) : 0;
    const totalGross = gSal+gSS+gPen+gOth+cSal+cSS+cPen+cOth;

    // RMD / conversions off pre-tax
    const cPreMask = owner.map((o,i)=> (o===1 && hier[i]===2)?1:0);
    const gPreMask = owner.map((o,i)=> (o===2 && hier[i]===2)?1:0);
    const c401 = sp(prevBals, cPreMask), g401 = sp(prevBals, gPreMask);
    const rmdDiv = (age)=> { const a=Math.min(age,120); let div=0; for(let i=0;i<I.rmdAge.length;i++){ if(a>=I.rmdAge[i]) div=I.rmdDiv[i]; } return div; };
    // SURVIVOR ROLLOVER: once an owner has died, their pre-tax money is the surviving spouse's,
    // so its RMD follows the SURVIVOR's age and RMD-start age (not the deceased's continuing age).
    // Per-account pre-tax balances (c401/g401) are unchanged. Must stay in lockstep with Master!A8.
    const cRmdAge   = (yr>gDeath && cAlive) ? genaAge     : craigAge;   // Craig's pre-tax bucket
    const cRmdStart = (yr>gDeath && cAlive) ? I.rmdStartG : I.rmdStartC;
    const gRmdAge   = (yr>cDeath && gAlive) ? craigAge    : genaAge;    // Gena's pre-tax bucket
    const gRmdStart = (yr>cDeath && gAlive) ? I.rmdStartC : I.rmdStartG;
    const rmdC = cRmdAge>=cRmdStart ? (rmdDiv(cRmdAge)? c401/rmdDiv(cRmdAge):0) : 0;
    const rmdG = gRmdAge>=gRmdStart ? (rmdDiv(gRmdAge)? g401/rmdDiv(gRmdAge):0) : 0;
    const totalRMD = rmdC+rmdG;
    const convCreq = (I.convTable[yr]?.c)||0, convGreq = (I.convTable[yr]?.g)||0;
    const convC = Math.max(0, Math.min(convCreq, c401-rmdC));
    const convG = Math.max(0, Math.min(convGreq, g401-rmdG));
    const totalConv = convC+convG;
    const forcedW = prevBals.map((b,i)=>
      cPreMask[i]*(c401? b/c401:0)*(rmdC+convC) + gPreMask[i]*(g401? b/g401:0)*(rmdG+convG));
    const remBals = prevBals.map((b,i)=> Math.max(0, b-forcedW[i]));

    // filing status / std deduction / SS taxation
    const survMult = !n2 ? 1 : ((gAlive&&cAlive)?1 : ((gAlive||cAlive)? 1-I.survivorReduce : 0));
    const rInf = I.baseLiving*survMult*Math.pow(1+I.inflLiving, idx);
    const bothAliveFS = (gAlive&&cAlive)||(yr===gDeath&&cAlive)||(yr===cDeath&&gAlive);
    const fsRaw = String(I.filingStatus||'').toUpperCase().trim();
    const chosenFS = (fsRaw==='MARRIED FILING SEPARATELY'||fsRaw==='MFS')?'MFS':
                     (fsRaw==='HEAD OF HOUSEHOLD'||fsRaw==='HOH')?'HoH':
                     (fsRaw==='SINGLE')?'Single':'MFJ';
    const filing = bothAliveFS?chosenFS : (chosenFS==='HoH'?'HoH':'Single');
    const stdBase = filing==='MFJ'?32200 : filing==='HoH'?24150 : 16100;
    const stdDed = stdBase*Math.pow(1+I.inflStdDed, idx);
    const totalSS = gSS+cSS;
    const nonSSGross = gSal+gPen+gOth+cSal+cPen+cOth;
    const combIncome = nonSSGross+totalRMD+totalConv+0.5*totalSS;
    let taxableSS;
    if (filing==='MFJ') taxableSS = combIncome>44000 ? Math.min(0.85*totalSS, 0.85*(combIncome-44000)+Math.min(6000,0.5*totalSS))
                        : combIncome>32000 ? Math.min(0.5*totalSS, 0.5*(combIncome-32000)) : 0;
    else taxableSS = combIncome>34000 ? Math.min(0.85*totalSS, 0.85*(combIncome-34000)+Math.min(4500,0.5*totalSS))
                        : combIncome>25000 ? Math.min(0.5*totalSS, 0.5*(combIncome-25000)) : 0;
    const taxableGross = nonSSGross+taxableSS+totalRMD+totalConv;

    // IRMAA + healthcare
    const irmaaT = filing==='MFJ'?I.irmaaMFJ:I.irmaaSingle;
    const irmaaAdd = (age, pAlive, mAge)=> {
      if (!(pAlive && age>=mAge)) return 0;
      let v=0; for(let i=0;i<irmaaT.length;i++){ if(I.magiThresh && (filing==='MFJ'?I.magiMFJ:I.magiSingle)[i]<=taxableGross) v=irmaaT[i]; }
      return v*12;
    };
    const gHC = gAlive ? (craigAge>=I.p1_medAge ? I.p1_medPrem+irmaaAdd(craigAge,gAlive,I.p1_medAge) : I.p1_preMed) : 0;
    const cHC = cAlive ? (genaAge >=I.p2_medAge ? I.p2_medPrem+irmaaAdd(genaAge, cAlive,I.p2_medAge) : I.p2_preMed) : 0;
    const uInf = (gHC+cHC)*Math.pow(1+I.inflHC, idx);
    const vDebt = I.debts.reduce((s,d)=> s + (nameL(d.status)==='yes' && yOf(d.start)<=yr && yOf(d.end)>=yr ? d.amount : 0), 0);
    const wTotal = gs15(gs15(rInf)+gs15(uInf)+vDebt);

    const baseTaxable = Math.max(0, taxableGross-stdDed);
    const curBrackets = filing==='MFJ'?TB : filing==='HoH'?[0,17700,67450,105700,201775,256225,640600] : TB.map(b=>b/2);
    // Married Filing Separately = two separate returns (mirrors the sheet's var_*_MFS path).
    // Group income per person, tax each person's SS under the MFS rule (85% taxable once there is any
    // other income — no $25k/$34k floor), subtract each person's own standard deduction, then tax each
    // return on its own and sum. Engine prefixes are split: person 1 (Craig) income = g*, RMD/conv =
    // rmdC/convC, 401k = c401; person 2 (Gena) income = c*, RMD/conv = rmdG/convG, 401k = g401.
    const isMFS = (filing==='MFS');
    const p1Inc = gSal+gPen+gOth+rmdC+convC, p2Inc = cSal+cPen+cOth+rmdG+convG;
    const p1SSx = Math.min(0.85*gSS, 0.85*(p1Inc + 0.5*gSS));
    const p2SSx = Math.min(0.85*cSS, 0.85*(p2Inc + 0.5*cSS));
    const p1TaxableMFS = Math.max(0, (p1Inc + p1SSx) - stdDed);
    const p2TaxableMFS = Math.max(0, (p2Inc + p2SSx) - stdDed);
    const baseTaxes = isMFS ? bracketTax(p1TaxableMFS, curBrackets) + bracketTax(p2TaxableMFS, curBrackets)
                            : bracketTax(baseTaxable, curBrackets);
    const baseStateTax = baseTaxable*I.stateTax;

    // chosen extra (smile) — projection input knob
    const phYr = (s,e,amt)=> (yr>=yOf(s)&&yr<=yOf(e))?amt:null;
    const smile = [ [I.ph1Start,I.ph1End,I.ph1Spend], [I.ph2Start,I.ph2End,I.ph2Spend], [I.ph3Start,I.ph3End,I.ph3Spend] ]
      .reduce((acc,p)=> acc!=null?acc:phYr(p[0],p[1],p[2]), null) || 0;
    const assumeExtra = nameL(I.assumeExtra)==='yes';
    const chosenExtra = (opts.extraOverride!=null) ? opts.extraOverride(yr, smile) : (assumeExtra?smile:0);

    const targetNet = Math.max(0, gs15(wTotal+chosenExtra+baseTaxes+baseStateTax-totalGross-totalRMD));

    // effective hierarchy (locked accounts deferred unless owner deceased)
    const ownerDeceased = (i)=> owner[i]===1?yr>gDeath : owner[i]===2?yr>cDeath : false;
    const effH = remBals.map((b,i)=> yr<acctUnlock[i] ? (ownerDeceased(i)?hier[i]:(hier[i]===1?1:99)) : hier[i]);
    const B1 = sp(remBals, effH.map(h=>h===1)), B2 = sp(remBals, effH.map(h=>h===2)), B3 = sp(remBals, effH.map(h=>h===3));

    // W1 taxable (cap gains)
    const cgFrac = Math.max(0, B1? (B1-prevBasis)/B1 : 0);
    const cgEst = Math.min(targetNet,B1)*cgFrac;
    const cgTaxEst = cgEst*xlookupRate(baseTaxable+cgEst, LTCG_B, LTCG_R);
    const W1 = Math.min(targetNet+cgTaxEst, B1);
    const cgActGain = W1*cgFrac;
    const cgTaxActual = cgActGain*xlookupRate(baseTaxable+cgActGain, LTCG_B, LTCG_R);
    const net1 = W1-cgTaxActual, remNet1 = Math.max(0, targetNet-net1);

    // W2 pre-tax (marginal gross-up w/ SS multiplier)
    const marginal = taxableGross<stdDed ? 0 : xlookupRate(baseTaxable, curBrackets, TR);
    const ssMult = taxableSS>=0.85*totalSS ? 1 :
      (filing==='MFJ' ? (combIncome>44000?1.85:combIncome>32000?1.5:1)
                      : (combIncome>34000?1.85:combIncome>25000?1.5:1));
    const effMarg = Math.min(0.99, marginal*ssMult);
    const W2 = Math.min(remNet1/(1-effMarg), B2);
    const totTaxableW2 = Math.max(0, taxableGross+W2-stdDed);
    // MFS: split the pre-tax W2 withdrawal between the two returns by 401k balance (mirrors the sheet's
    // var_C_W2_Frac), add each share to that person's taxable, and tax each return separately.
    const w2FracP1 = (c401+g401)>0 ? c401/(c401+g401) : 0.5;   // person 1 (Craig) share, by 401k balance
    const p1TaxableWW2 = Math.max(0, (p1Inc + p1SSx + W2*w2FracP1) - stdDed);
    const p2TaxableWW2 = Math.max(0, (p2Inc + p2SSx + W2*(1-w2FracP1)) - stdDed);
    const taxesW2 = isMFS ? bracketTax(p1TaxableWW2, curBrackets) + bracketTax(p2TaxableWW2, curBrackets)
                          : bracketTax(totTaxableW2, curBrackets);
    const ordTaxActual = taxesW2-baseTaxes;
    const net2 = W2-ordTaxActual, remNet2 = Math.max(0, remNet1-net2);

    // W3 roth
    const W3 = Math.min(remNet2, B3);

    const extraTaxes = cgTaxActual+ordTaxActual;
    const totalTaxable = Math.max(0, taxableGross+W2-stdDed);
    const stateTax = totalTaxable*I.stateTax;
    const totalTaxes = baseTaxes+extraTaxes+stateTax;
    const fundingReq = Math.max(0, wTotal+chosenExtra+totalTaxes-totalGross);
    const surplus = Math.max(0, totalGross-(wTotal+chosenExtra+totalTaxes));

    // disbursement allocation per account
    const dDisc = remBals.map((b,i)=> gsR(
      (effH[i]===1?(B1? b/B1*W1:0):0)+(effH[i]===2?(B2? b/B2*W2:0):0)+(effH[i]===3?(B3? b/B3*W3:0):0)));
    const D = prevBals.map((b,i)=> gsR(forcedW[i]+dDisc[i]));

    // reinvested RMDs + conversion destinations (basis tracking)
    const reinvRMD = Math.max(0, totalRMD-fundingReq);
    const reinvC = Math.round(totalRMD>0? reinvRMD*(rmdC/totalRMD):0);
    const reinvG = Math.round(totalRMD>0? reinvRMD*(rmdG/totalRMD):0);
    const cRoth = owner.map((o,i)=>(o===1&&hier[i]===3)?1:0), gRoth = owner.map((o,i)=>(o===2&&hier[i]===3)?1:0);
    const cTax  = owner.map((o,i)=>(o===1&&hier[i]===1)?1:0), gTax  = owner.map((o,i)=>(o===2&&hier[i]===1)?1:0);
    const anyTax = hier.map(h=>h===1?1:0);
    const nSum = m=> m.reduce((s,v)=>s+v,0);
    const dest = (roth, tax)=> { const rn=nSum(roth), tn=nSum(tax), an=nSum(anyTax);
      if (rn>0) return roth.map(v=>v/rn); if (tn>0) return tax.map(v=>v/tn); return roth.map(()=>0); };
    const cConvDest = dest(cRoth,cTax), gConvDest = dest(gRoth,gTax);
    const reinvDest = (tax)=> { const tn=nSum(tax), an=nSum(anyTax);
      if (tn>0) return tax.map(v=>v/tn); if (an>0) return anyTax.map(v=>v/an); return tax.map(()=>0); };
    const cReinvDest = reinvDest(cTax), gReinvDest = reinvDest(gTax);
    const reinvArr = prevBals.map((_,i)=> cConvDest[i]*convC + gConvDest[i]*convG + cReinvDest[i]*reinvC + gReinvDest[i]*reinvG);

    const basisConsumed = W1*(B1? prevBasis/B1:0);
    const basisAdded = contribAmt.reduce((s,_,i)=> s + ((hier[i]===1)?(contribAmt[i]+matchAmt[i]+reinvArr[i]):0), 0);
    const basisNext = Math.max(0, prevBasis-basisConsumed+basisAdded);
    const basisNextR = gsR(basisNext);   // sheet stores & carries ROUND(var_TaxBasis_Next,0)

    const post = prevBals.map((b,i)=> gsR(b-D[i]+reinvArr[i]+contribAmt[i]+matchAmt[i]));
    const mid  = prevBals.map((b,i)=> gsR((b+post[i])/2));

  document.querySelectorAll('.preset').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on')});b.classList.add('on');var p=PRE[b.dataset.p];$('yr1').value=p.yr1;$('yrs').value=p.yrs;$('inf').value=p.inf;$('cola').value=p.cola;$('spendadj').value=p.spend;$('lateSw').classList.remove('on');$('lateBody').classList.add('hide');recompute();});});
  function mark(){document.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on')});document.querySelector('[data-p=custom]').classList.add('on');}

  $('spend').addEventListener('input',paintSpend);
  $('goal').addEventListener('input',paintGoal);
  $('d-extra').addEventListener('input',function(){ $('spend').value=$('d-extra').value; paintSpend(); paintDecision(); });
  function postHeight(){ try{ parent.postMessage({type:'rbpT1Height', h:Math.ceil(document.body.scrollHeight)}, '*'); }catch(e){} }
  function applyPlan(plan){
    if(!plan){ return; }
    I=plan;
    START=(I.planStart?(new Date(I.planStart).getFullYear()||new Date().getFullYear()):new Date().getFullYear());
    COMMITTED=(I.committedExtra!=null?I.committedExtra:0);
    REP=(function(){var s=0,w=0;(I.accounts||[]).forEach(function(a){s+=(a.rate||0)*(a.start||0);w+=(a.start||0);});return w?s/w*100:6.5;})();

    catch(e){ var L=$('loading'); if(L){L.innerHTML='Couldn\u2019t read your plan \u2014 hit <b>Reload</b> at the top of the page.';} return; }
    try{ var _b0=RBP.runStress(I,{start:START,plannedExtra:0}); MUSTHAVE=(_b0.floorY1?_b0.floorY1.total:0)+((_b0.cashflow&&_b0.cashflow[0])?(_b0.cashflow[0].taxes||0):0); }catch(e){ MUSTHAVE=0; }
    var smax=Math.max(80, Math.round((baseR.safeExtra||0)/1000*1.6)); $('spend').max=smax; $('d-extra').max=smax;
    $('spendScale').innerHTML='<span>$0</span><span>$'+Math.round(smax/2)+'K</span><span>$'+smax+'K</span>';
    $('goalScale').innerHTML='<span>'+fmtM(I.legacyB8*0.5)+'</span><span>'+fmtM(I.legacyB8)+'</span><span>'+fmtM(I.legacyB8*1.5)+'</span>';
    $('yr1').value=-37; $('yrs').value=1; $('spendadj').value=0;
    $('inf').value=Math.max(1,Math.min(10,(I.inflLiving!=null?I.inflLiving:0.025)*100)).toFixed(1);
    $('cola').value=Math.max(0,Math.min(5,(I.inflSS!=null?I.inflSS:0.025)*100)).toFixed(1);
    document.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on')});
    var _b08=document.querySelector('[data-p=c2008]'); if(_b08) _b08.classList.add('on');
    $('loading').style.display='none'; $('t1body').style.display='';
    var hs=$('heroSub'); if(hs) hs.innerHTML='your saved plan<br>real engine \u00b7 instant';
    recompute(); postHeight(); setTimeout(postHeight,80);
  }
  window.addEventListener('message',function(ev){ if(ev.data&&ev.data.type==='rbpPlan'){ gotPlan=true; applyPlan(ev.data.I); } });
  window.addEventListener('resize',function(){ if(I){ recompute(); postHeight(); } });
  try{ parent.postMessage({type:'rbpT1Ready'}, '*'); }catch(e){}
  setTimeout(function(){ if(!gotPlan){ var L=$('loading'); if(L) L.innerHTML='Waiting for your saved plan\u2026<br><span style="font-size:11px;color:#90A4AE">This fills in with your real numbers on the live site. Hit <b>Reload</b> at the top if needed.</span>'; } }, 4000);
  postHeight();
})();
<\/script>

</script>

<body>
<div id="rc">

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var GOAL=0, results=[], total=0;
  var fmtM=function(v){return (v<0?'-$':'$')+(Math.abs(v)/1e6).toFixed(2)+'M';};
  var fmtK=function(v){return '$'+Math.round(v/1000)+'K';};
  function setup(c,h){var dpr=window.devicePixelRatio||1,W=c.clientWidth;c.width=W*dpr;c.height=h*dpr;var g=c.getContext('2d');g.scale(dpr,dpr);g.clearRect(0,0,W,h);return{g:g,W:W,H:h};}
  function postHeight(){ try{ parent.postMessage({type:'rbpRCHeight', h:Math.ceil(document.body.scrollHeight)}, '*'); }catch(e){} }

  function startRun(){
    results=[]; $('runzone').style.display='none'; $('results').style.display='none';
    $('prog').style.display=''; $('progmsg').textContent='Starting\u2026'; $('progbar').style.width='0%';
    parent.postMessage({type:'rbpRCrun'},'*'); postHeight();
  }

  function draw(){
    var c=$('chart'),s=setup(c,210),g=s.g,W=s.W,H=s.H;
    var ok=results.filter(function(d){return !d.error;});
    var maxV=Math.max(GOAL, Math.max.apply(null,ok.map(function(d){return d.end;})))*1.16||1;
    var padL=54,padR=12,padT=14,padB=42,pw=W-padL-padR,ph=H-padT-padB;
    var n=results.length, slot=pw/n, bw=Math.min(58,slot*0.6);
    var Y=function(v){return padT+(1-v/maxV)*ph;};
    g.strokeStyle='#EEF1F4';g.fillStyle='#5F6368';g.font='10px sans-serif';g.textAlign='right';g.textBaseline='middle';
    for(var k=0;k<=3;k++){var v=maxV*k/3,yy=Y(v);g.beginPath();g.moveTo(padL,yy);g.lineTo(W-padR,yy);g.stroke();g.fillText(v>=1e6?('$'+(v/1e6).toFixed(1)+'M'):('$'+Math.round(v/1000)+'K'),padL-7,yy);}
    results.forEach(function(d,i){
      var x=padL+slot*i+(slot-bw)/2;
      if(d.error){ g.fillStyle='#90A4AE';g.font='10px sans-serif';g.textAlign='center';g.textBaseline='bottom';g.fillText('n/a',x+bw/2,Y(0)-3); }
      else { var yy=Y(Math.max(0,d.end));
        g.fillStyle=(d.end>=GOAL)?'#16AEB6':'#E8745E';g.fillRect(x,yy,bw,H-padB-yy);
        g.fillStyle='#0B2239';g.font='bold 10.5px sans-serif';g.textAlign='center';g.textBaseline='bottom';g.fillText(fmtM(d.end),x+bw/2,yy-3); }
      g.fillStyle='#0B2239';g.font='bold 10px sans-serif';g.textAlign='center';g.textBaseline='top';
      var nm=d.name.split(' '); g.fillText(nm[0],x+bw/2,H-padB+6); if(nm[1])g.fillText(nm.slice(1).join(' '),x+bw/2,H-padB+18);
    });
    var gy=Y(GOAL);
    g.strokeStyle='#E0A33A';g.setLineDash([6,4]);g.lineWidth=2;g.beginPath();g.moveTo(padL,gy);g.lineTo(W-padR,gy);g.stroke();g.setLineDash([]);
    g.fillStyle='#9a6c12';g.font='bold 10px sans-serif';g.textAlign='left';g.textBaseline='bottom';g.fillText('goal '+fmtM(GOAL),padL+2,gy-3);
  }

  function paint(){
    var ok=results.filter(function(d){return !d.error;});
    var meet=ok.filter(function(d){return d.end>=GOAL;}).length;
    var depl=ok.filter(function(d){return d.depl;}).length;
    var worst=ok.slice().sort(function(a,b){return a.end-b.end;})[0]||{name:'\u2014',end:0,safe:0};
    var h='';
    if(meet===ok.length && ok.length){
      h+='<span class="big">Your plan rides out every real crash on record.</span>';
      h+='In all '+ok.length+' \u2014 including the Great Depression and 1970s stagflation \u2014 you finish <b>at or above your legacy goal</b>. Real cushion.';
    } else if(depl>0){
      h+='<span class="big">Held to your current spending, '+depl+' of these would run your savings dry.</span>';
      h+='That\u2019s sequence-of-returns risk from a severe early crash. The <b>safe spend</b> column shows the most you could draw and still come through each one whole (toughest: <b>'+worst.name+'</b>, safe at <b>'+fmtK(worst.safe)+'/yr</b>).';
    } else {
      h+='<span class="big">Your plan survives all of them, but '+(ok.length-meet)+' finish below your legacy goal.</span>';
      h+='Toughest is <b>'+worst.name+'</b>, ending near <b>'+fmtM(worst.end)+'</b>. The <b>safe spend</b> column shows the draw that keeps each one whole.';
    }
    $('head').innerHTML=h;
    $('rows').innerHTML=results.map(function(d){
      if(d.error) return '<tr><td><b>'+d.name+'</b></td><td style="color:#5F6368">'+d.sev+'</td><td class="n" colspan="3" style="color:#90A4AE">couldn\u2019t read from sheet</td></tr>';
      var cls=(d.depl||d.below)?'bad':(d.end>=GOAL?'ok':'warn');
      var txt=d.depl?'runs dry':(d.below?'dips below floor':(d.end>=GOAL?'meets goal':'below goal'));
      return '<tr><td><b>'+d.name+'</b></td><td style="color:#5F6368">'+d.sev+'</td>'+
        '<td class="n">'+fmtM(d.end)+'</td><td class="n" style="color:#0c7b84">'+fmtK(d.safe)+'</td>'+
        '<td style="text-align:right"><span class="pill '+cls+'">'+txt+'</span></td></tr>';
    }).join('');
  }

  window.addEventListener('message',function(ev){
    var m=ev.data; if(!m) return;
    if(m.type==='rbpRCready'){ $('load').style.display='none'; $('main').style.display=''; postHeight(); }
    else if(m.type==='rbpRCctx'){ GOAL=m.goal||0; total=m.total||6; }
    else if(m.type==='rbpRCprogress'){ $('progmsg').textContent='Running\u2026 '+m.n+' of '+m.total+'  ('+m.name+')'; $('progbar').style.width=Math.round((m.n-1)/m.total*100)+'%'; postHeight(); }
    else if(m.type==='rbpRCresult'){ results[m.i]=m.r; }
    else if(m.type==='rbpRCdone'){ $('prog').style.display='none'; $('results').style.display=''; var rb=$('rerun'); draw(); paint(); postHeight(); setTimeout(postHeight,80); }
  });
  $('runbtn').addEventListener('click',startRun);
  document.addEventListener('click',function(e){ if(e.target&&e.target.id==='rerun') startRun(); });
  window.addEventListener('resize',function(){ if($('results').style.display!=='none'){ draw(); postHeight(); } });
  try{ parent.postMessage({type:'rbpRCReadySig'}, '*'); }catch(e){}
  postHeight();
})();
<\/script>

<script type="text/plain" id="s3"><!DOCTYPE html>

  .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .foot{font-size:10.5px;color:#90A4AE;margin-top:6px;text-align:center;line-height:1.5}
  @media(max-width:760px){
    .bar-head,.bar-row{grid-template-columns:96px 1fr 84px}
    .bar-head span:nth-child(2),.bar-plan{display:none}
    .tbl-head{display:none}

    .tbl-row>div{display:flex;justify-content:space-between;gap:12px}

<body>
<div class="shell">
  <div class="hero"><div class="tg">Test 3 &middot; Scenario Sweep</div><h1>The most you can safely spend, at every crash level</h1><div class="sub" id="heroSub">your saved plan<br>real engine &middot; to the dollar</div></div>

  <div class="howto">
    <b>One question, asked at every crash size:</b> if the market dropped this much the year you retire, what&rsquo;s the most extra you could spend on top of your must-haves and still leave your legacy? The bar is that safe amount; the table below shows when the money runs dry under each spending choice.
  </div>

  <div id="loading" style="padding:48px 16px;text-align:center;color:#5F6368;font-size:13px">Running every crash level through your plan&hellip;<br><span style="font-size:11px;color:#90A4AE">If this stays, hit <b>Reload</b> at the top of the page.</span></div>

  <div id="swbody" style="display:none">
    <div class="card">
      <div class="seclbl">Safe extra to spend &middot; every crash level</div>
      <div class="secsub">Each bar is the most Phase&nbsp;1 extra you could safely spend if that crash hit in year&nbsp;1. Later phases scale with it (shown as P2 / P3).</div>
      <div class="bar-head"><span>Scenario</span><span class="gold">Your plan</span><span>Safe extra / yr &middot; by phase</span><span style="text-align:right">Amount</span></div>
      <div id="bars"></div>
      <div class="legend">
        <i><span class="sw" style="background:#16AEB6"></span>Comfortable</i>
        <i><span class="sw" style="background:#E0A33A"></span>Getting tight</i>
        <i><span class="sw" style="background:#CF5A35"></span>Severe</i>
        <i><span class="sw" style="background:#f4b86a"></span>Below your current plan &mdash; you&rsquo;d cut</i>
      </div>
    </div>

    <div class="card">
      <div class="seclbl">When does the portfolio run dry?</div>
      <div class="secsub">Four spending choices, each crash level. &ldquo;Survives&rdquo; means the money lasts your whole plan.</div>
      <div class="tbl-head">
        <span>Scenario</span><span>Must-haves/yr</span><span>Must-haves only</span><span>At full plan</span><span>Reduce to</span><span>At reduced plan</span>
      </div>
      <div id="table"></div>
      <div class="tbl-note">
        <b>Must-haves only</b> = paused all extra, just the bill you can&rsquo;t skip. &nbsp;
        <b>At full plan</b> = your current extra held rigid through the crash. &nbsp;
        <b class="warn">Reduce to</b> = the Phase&nbsp;1 amount that still clears your legacy. &nbsp;
        <b class="ok">At reduced plan</b> = if you cut to that number, the plan survives.
      </div>
    </div>
    <p class="foot">Every figure is solved live from your saved plan &mdash; taxes, RMDs, and Social Security timing included. Nothing here changes your saved data.</p>
  </div>
</div>

<script>
/* ============================================================================
 * RetireBlueprint Pro — Engine  (rbp-engine.js)  · SINGLE SOURCE OF TRUTH
 * ----------------------------------------------------------------------------
 * One shared, full-precision engine for every page. No $500 rounding, no
 * estimated tax margins — taxes are computed exactly inside the projection.
 *
 *   RBP.project(I, opts)        → year-by-year rows (the Master array, ported)
 *   RBP.solveSafeExtra(I)       → max safe extra spend (honest binary search)
 *   RBP.runStress(I, params)    → crash scenario: ending / hit / crossover /
 *                                 re-solved safe extra / full series
 *   RBP.buildI(payload, D)      → map a connector input payload → engine input I
 *
 * Validated to the dollar against the live Google Sheet: base case (all cash-
 * flow columns exact, balances within 0.005%) and the full crash ladder
 * (ending, hit, AND crossover year exact, −10% through −40%).
 * ==========================================================================*/
function gs15(x){ if(!isFinite(x)||x===0)return x; var d=Math.ceil(Math.log10(Math.abs(x))); var p=15-d; var f=Math.pow(10,p); return Math.round(x*f)/f; }
function gsR(x){ x=gs15(x); return x<0?-Math.round(-x):Math.round(x); }
function rbpProject(I, opts) {
  opts = opts || {};
  const yOf = d => (d ? new Date(d).getFullYear() : null);
  const mOf = d => (d ? new Date(d).getMonth() + 1 : null);
  const startYear = yOf(I.planStart), pm = mOf(I.planStart), pd = new Date(I.planStart).getDate();

  const gLife = (I.p1_lifeEnd - I.p1_ageStart) || 0;     // var_G_Life  (col-B person)
  const cLife = (I.p2_lifeEnd - I.p2_ageStart) || 0;     // var_C_Life  (col-D person)
  // Run THROUGH the entered death-age year for the longest-lived person (not one year short).
  // Age is stamped at year-start, so a death age of 102 needs (102-currentAge)+1 rows for the final
  // row to read 102. MUST stay in lockstep with the sheet's var_Duration = MIN(var_Max_Duration+1,111).
  const duration = Math.min(Math.max(gLife, cLife) + 1, 111);

  // Tax Engine tables
  const TB = I.taxBrackets, TR = I.taxRates;             // length 7 (C8:C14 / D8:D14)
  const TRDiff = TR.map((r,i) => r - (i ? TR[i-1] : 0)); // var_Tax_Rate_Diffs
  const LTCG_B = [0, 94050, 583750], LTCG_R = [0, 0.15, 0.20];

  // accounts (length 12)
  const A = I.accounts; // {statusA, statusG, type, name, start, rate, basis, contrib, match, cStart, cEnd, wStart}
  const nameL = s => String(s||'').toLowerCase().trim();
  const n1 = nameL(I.name1), n2 = nameL(I.name2);
  const owner = A.map(a => {
    const ow = nameL(a.owner);          // Owner column (C): partner name or "Joint"
    if (n1 && ow.includes(n1)) return 1;  // → partner 1 (Craig)
    if (n2 && ow.includes(n2)) return 2;  // → partner 2 (Gena)
    return 0;                              // Joint / blank → unattributed (matches Sheet)
  });
  const incYes = A.map(a => nameL(a.statusA) === 'yes');
  const rate = A.map(a => (a.rate||0));                 // already decimal
  const startBal = A.map((a,i) => (a.start||0) * (incYes[i]?1:0));
  const typeL = A.map(a => nameL(a.type));
  const hier = typeL.map(t => t.includes('taxable')?1 : t.includes('pre')?2 : t.includes('roth')?3 : 99);
  const gUnlock = I.p1_unlock ? yOf(I.p1_unlock) : startYear;
  const cUnlock = I.p2_unlock ? yOf(I.p2_unlock) : startYear;
  const acctUnlock = A.map((a,i) => a.wStart ? yOf(a.wStart) : (owner[i]===1?gUnlock : owner[i]===2?cUnlock : startYear));

  const taxBasisInit = A.reduce((s,a,i)=> s + ((hier[i]===1 && incYes[i]) ? (a.basis||0) : 0), 0);

  // window proration helper: income active fraction for [S,E] in year yr (matches the IF ladders)
  function annualFrac(yr, S, E, startInclusive) {
    // mirrors the pension/other LET windows
    if (!S) return startInclusive ? 1 : 0;
    const ys = yOf(S);
    if (yr < ys) return 0;
    if (!E) return (yr===ys) ? (13-mOf(S))/12 : 1;
    const ye = yOf(E);
    if (yr > ye) return 0;
    if (ys===ye) return (mOf(E)-mOf(S)+1)/12;
    if (yr===ys) return (13-mOf(S))/12;
    if (yr===ye) return mOf(E)/12;
    return 1;
  }
  // OTHER income window — mirrors the sheet's var_*_Oth EXACTLY, including its quirk that a blank
  // end date reads as YEAR(blank)=1899, so any plan year is "after" it and the income becomes 0.
  function otherFrac(yr, S, E) {
    if (!S) return 0;
    const ys = yOf(S);
    if (yr < ys) return 0;
    if (!E) return 0;                         // blank end date -> 0 (matches the sheet)
    const ye = yOf(E);
    if (yr > ye) return 0;
    if (ys === ye) return (mOf(E)-mOf(S)+1)/12;
    if (yr === ys) return (13-mOf(S))/12;
    if (yr === ye) return mOf(E)/12;
    return 1;
  }
  const bracketTax = (taxable, brackets) =>
    brackets.reduce((s,b,i)=> s + (taxable>b ? (taxable-b)*TRDiff[i] : 0), 0);
  const xlookupRate = (x, B, R) => { let r=R[0]; for(let i=0;i<B.length;i++){ if(x>=B[i]) r=R[i]; } return r; };

  let prevBals = startBal.slice(), prevBasis = taxBasisInit;
  const rows = [];

  for (let k=0; k<duration; k++) {
    const yr = startYear + k, idx = yr - startYear;

    // contributions
    const cActive = A.map((a,i)=> (a.contrib>0) *
      (a.cStart? (yr>=yOf(a.cStart)?1:0):1) * (a.cEnd? (yr<=yOf(a.cEnd)?1:0):1) * (incYes[i]?1:0));
    const cPro = A.map((a)=> (a.cStart? (yOf(a.cStart)===yr? (13-mOf(a.cStart))/12 : 1):1) *
      (a.cEnd? (yOf(a.cEnd)===yr? mOf(a.cEnd)/12 : 1):1));
    const contribAmt = A.map((a,i)=> Math.round((a.contrib||0)*cActive[i]*cPro[i]));
    const matchAmt   = A.map((a,i)=> Math.round((a.match||0)*cActive[i]*cPro[i]));
    const sp = (arr,m)=> arr.reduce((s,v,i)=> s + v*(m[i]?1:0), 0);
    const craigContrib = Math.round(sp(contribAmt, owner.map(o=>o===1)));
    const craigMatch   = Math.round(sp(matchAmt,   owner.map(o=>o===1)));
    const genaContrib  = Math.round(sp(contribAmt, owner.map(o=>o===2)));
    const genaMatch    = Math.round(sp(matchAmt,   owner.map(o=>o===2)));
    const totalContrib = craigContrib+craigMatch+genaContrib+genaMatch;

    const gDeath = startYear+gLife, cDeath = startYear+cLife;
    const gAlive = yr<=gDeath, cAlive = yr<=cDeath;
    const craigAge = I.p1_ageStart+idx, genaAge = I.p2_ageStart+idx;

    const gSal = gAlive ? I.p1_salary*(!I.p1_salEnd?1:(yr<yOf(I.p1_salEnd)?1:(yr===yOf(I.p1_salEnd)?mOf(I.p1_salEnd)/12:0))) : 0;
    const ssFrac = (start)=> !start?1:(yr<yOf(start)?0:(yr===yOf(start)?(13-mOf(start))/12:1));
    const gProjSS = I.p1_ssMonthly*12*ssFrac(I.p1_ssStart)*Math.pow(1+I.inflSS, idx);
    const cProjSS = I.p2_ssMonthly*12*ssFrac(I.p2_ssStart)*Math.pow(1+I.inflSS, idx);
    const gSS = gAlive ? ((!cAlive && craigAge>=60) ? Math.max(gProjSS,cProjSS) : gProjSS) : 0;
    const cSS = cAlive ? ((!gAlive && genaAge>=60)  ? Math.max(cProjSS,gProjSS) : cProjSS) : 0;
    const gPen = gAlive ? I.p1_pension*12*annualFrac(yr, I.p1_penStart, I.p1_penEnd, true) : 0;
    const gOth = gAlive ? I.p1_other*otherFrac(yr, I.p1_othStart, I.p1_othEnd) : 0;
    const cSal = cAlive ? I.p2_salary*(!I.p2_salEnd?1:(yr<yOf(I.p2_salEnd)?1:(yr===yOf(I.p2_salEnd)?mOf(I.p2_salEnd)/12:0))) : 0;
    const cPen = cAlive ? I.p2_pension*12*annualFrac(yr, I.p2_penStart, I.p2_penEnd, true) : 0;
    const cOth = cAlive ? I.p2_other*otherFrac(yr, I.p2_othStart, I.p2_othEnd) : 0;
    const totalGross = gSal+gSS+gPen+gOth+cSal+cSS+cPen+cOth;

    // RMD / conversions off pre-tax
    const cPreMask = owner.map((o,i)=> (o===1 && hier[i]===2)?1:0);
    const gPreMask = owner.map((o,i)=> (o===2 && hier[i]===2)?1:0);
    const c401 = sp(prevBals, cPreMask), g401 = sp(prevBals, gPreMask);
    const rmdDiv = (age)=> { const a=Math.min(age,120); let div=0; for(let i=0;i<I.rmdAge.length;i++){ if(a>=I.rmdAge[i]) div=I.rmdDiv[i]; } return div; };
    // SURVIVOR ROLLOVER: once an owner has died, their pre-tax money is the surviving spouse's,
    // so its RMD follows the SURVIVOR's age and RMD-start age (not the deceased's continuing age).
    // Per-account pre-tax balances (c401/g401) are unchanged. Must stay in lockstep with Master!A8.
    const cRmdAge   = (yr>gDeath && cAlive) ? genaAge     : craigAge;   // Craig's pre-tax bucket
    const cRmdStart = (yr>gDeath && cAlive) ? I.rmdStartG : I.rmdStartC;
    const gRmdAge   = (yr>cDeath && gAlive) ? craigAge    : genaAge;    // Gena's pre-tax bucket
    const gRmdStart = (yr>cDeath && gAlive) ? I.rmdStartC : I.rmdStartG;
    const rmdC = cRmdAge>=cRmdStart ? (rmdDiv(cRmdAge)? c401/rmdDiv(cRmdAge):0) : 0;
    const rmdG = gRmdAge>=gRmdStart ? (rmdDiv(gRmdAge)? g401/rmdDiv(gRmdAge):0) : 0;
    const totalRMD = rmdC+rmdG;
    const convCreq = (I.convTable[yr]?.c)||0, convGreq = (I.convTable[yr]?.g)||0;
    const convC = Math.max(0, Math.min(convCreq, c401-rmdC));
    const convG = Math.max(0, Math.min(convGreq, g401-rmdG));
    const totalConv = convC+convG;
    const forcedW = prevBals.map((b,i)=>
      cPreMask[i]*(c401? b/c401:0)*(rmdC+convC) + gPreMask[i]*(g401? b/g401:0)*(rmdG+convG));
    const remBals = prevBals.map((b,i)=> Math.max(0, b-forcedW[i]));

    // filing status / std deduction / SS taxation
    const survMult = !n2 ? 1 : ((gAlive&&cAlive)?1 : ((gAlive||cAlive)? 1-I.survivorReduce : 0));
    const rInf = I.baseLiving*survMult*Math.pow(1+I.inflLiving, idx);
    const bothAliveFS = (gAlive&&cAlive)||(yr===gDeath&&cAlive)||(yr===cDeath&&gAlive);
    const fsRaw = String(I.filingStatus||'').toUpperCase().trim();
    const chosenFS = (fsRaw==='MARRIED FILING SEPARATELY'||fsRaw==='MFS')?'MFS':
                     (fsRaw==='HEAD OF HOUSEHOLD'||fsRaw==='HOH')?'HoH':
                     (fsRaw==='SINGLE')?'Single':'MFJ';
    const filing = bothAliveFS?chosenFS : (chosenFS==='HoH'?'HoH':'Single');
    const stdBase = filing==='MFJ'?32200 : filing==='HoH'?24150 : 16100;
    const stdDed = stdBase*Math.pow(1+I.inflStdDed, idx);
    const totalSS = gSS+cSS;
    const nonSSGross = gSal+gPen+gOth+cSal+cPen+cOth;
    const combIncome = nonSSGross+totalRMD+totalConv+0.5*totalSS;
    let taxableSS;
    if (filing==='MFJ') taxableSS = combIncome>44000 ? Math.min(0.85*totalSS, 0.85*(combIncome-44000)+Math.min(6000,0.5*totalSS))
                        : combIncome>32000 ? Math.min(0.5*totalSS, 0.5*(combIncome-32000)) : 0;
    else taxableSS = combIncome>34000 ? Math.min(0.85*totalSS, 0.85*(combIncome-34000)+Math.min(4500,0.5*totalSS))
                        : combIncome>25000 ? Math.min(0.5*totalSS, 0.5*(combIncome-25000)) : 0;
    const taxableGross = nonSSGross+taxableSS+totalRMD+totalConv;

    // IRMAA + healthcare
    const irmaaT = filing==='MFJ'?I.irmaaMFJ:I.irmaaSingle;
    const irmaaAdd = (age, pAlive, mAge)=> {
      if (!(pAlive && age>=mAge)) return 0;
      let v=0; for(let i=0;i<irmaaT.length;i++){ if(I.magiThresh && (filing==='MFJ'?I.magiMFJ:I.magiSingle)[i]<=taxableGross) v=irmaaT[i]; }
      return v*12;
    };
    const gHC = gAlive ? (craigAge>=I.p1_medAge ? I.p1_medPrem+irmaaAdd(craigAge,gAlive,I.p1_medAge) : I.p1_preMed) : 0;
    const cHC = cAlive ? (genaAge >=I.p2_medAge ? I.p2_medPrem+irmaaAdd(genaAge, cAlive,I.p2_medAge) : I.p2_preMed) : 0;
    const uInf = (gHC+cHC)*Math.pow(1+I.inflHC, idx);
    const vDebt = I.debts.reduce((s,d)=> s + (nameL(d.status)==='yes' && yOf(d.start)<=yr && yOf(d.end)>=yr ? d.amount : 0), 0);
    const wTotal = gs15(gs15(rInf)+gs15(uInf)+vDebt);

    const baseTaxable = Math.max(0, taxableGross-stdDed);
    const curBrackets = filing==='MFJ'?TB : filing==='HoH'?[0,17700,67450,105700,201775,256225,640600] : TB.map(b=>b/2);
    // Married Filing Separately = two separate returns (mirrors the sheet's var_*_MFS path).
    // Group income per person, tax each person's SS under the MFS rule (85% taxable once there is any
    // other income — no $25k/$34k floor), subtract each person's own standard deduction, then tax each
    // return on its own and sum. Engine prefixes are split: person 1 (Craig) income = g*, RMD/conv =
    // rmdC/convC, 401k = c401; person 2 (Gena) income = c*, RMD/conv = rmdG/convG, 401k = g401.
    const isMFS = (filing==='MFS');
    const p1Inc = gSal+gPen+gOth+rmdC+convC, p2Inc = cSal+cPen+cOth+rmdG+convG;
    const p1SSx = Math.min(0.85*gSS, 0.85*(p1Inc + 0.5*gSS));
    const p2SSx = Math.min(0.85*cSS, 0.85*(p2Inc + 0.5*cSS));
    const p1TaxableMFS = Math.max(0, (p1Inc + p1SSx) - stdDed);
    const p2TaxableMFS = Math.max(0, (p2Inc + p2SSx) - stdDed);
    const baseTaxes = isMFS ? bracketTax(p1TaxableMFS, curBrackets) + bracketTax(p2TaxableMFS, curBrackets)
                            : bracketTax(baseTaxable, curBrackets);
    const baseStateTax = baseTaxable*I.stateTax;

    // chosen extra (smile) — projection input knob
    const phYr = (s,e,amt)=> (yr>=yOf(s)&&yr<=yOf(e))?amt:null;
    const smile = [ [I.ph1Start,I.ph1End,I.ph1Spend], [I.ph2Start,I.ph2End,I.ph2Spend], [I.ph3Start,I.ph3End,I.ph3Spend] ]
      .reduce((acc,p)=> acc!=null?acc:phYr(p[0],p[1],p[2]), null) || 0;
    const assumeExtra = nameL(I.assumeExtra)==='yes';
    const chosenExtra = (opts.extraOverride!=null) ? opts.extraOverride(yr, smile) : (assumeExtra?smile:0);

    const targetNet = Math.max(0, gs15(wTotal+chosenExtra+baseTaxes+baseStateTax-totalGross-totalRMD));

    // effective hierarchy (locked accounts deferred unless owner deceased)
    const ownerDeceased = (i)=> owner[i]===1?yr>gDeath : owner[i]===2?yr>cDeath : false;
    const effH = remBals.map((b,i)=> yr<acctUnlock[i] ? (ownerDeceased(i)?hier[i]:(hier[i]===1?1:99)) : hier[i]);
    const B1 = sp(remBals, effH.map(h=>h===1)), B2 = sp(remBals, effH.map(h=>h===2)), B3 = sp(remBals, effH.map(h=>h===3));

    // W1 taxable (cap gains)
    const cgFrac = Math.max(0, B1? (B1-prevBasis)/B1 : 0);
    const cgEst = Math.min(targetNet,B1)*cgFrac;
    const cgTaxEst = cgEst*xlookupRate(baseTaxable+cgEst, LTCG_B, LTCG_R);
    const W1 = Math.min(targetNet+cgTaxEst, B1);
    const cgActGain = W1*cgFrac;
    const cgTaxActual = cgActGain*xlookupRate(baseTaxable+cgActGain, LTCG_B, LTCG_R);
    const net1 = W1-cgTaxActual, remNet1 = Math.max(0, targetNet-net1);

    // W2 pre-tax (marginal gross-up w/ SS multiplier)
    const marginal = taxableGross<stdDed ? 0 : xlookupRate(baseTaxable, curBrackets, TR);
    const ssMult = taxableSS>=0.85*totalSS ? 1 :
      (filing==='MFJ' ? (combIncome>44000?1.85:combIncome>32000?1.5:1)
                      : (combIncome>34000?1.85:combIncome>25000?1.5:1));
    const effMarg = Math.min(0.99, marginal*ssMult);
    const W2 = Math.min(remNet1/(1-effMarg), B2);
    const totTaxableW2 = Math.max(0, taxableGross+W2-stdDed);
    // MFS: split the pre-tax W2 withdrawal between the two returns by 401k balance (mirrors the sheet's
    // var_C_W2_Frac), add each share to that person's taxable, and tax each return separately.
    const w2FracP1 = (c401+g401)>0 ? c401/(c401+g401) : 0.5;   // person 1 (Craig) share, by 401k balance
    const p1TaxableWW2 = Math.max(0, (p1Inc + p1SSx + W2*w2FracP1) - stdDed);
    const p2TaxableWW2 = Math.max(0, (p2Inc + p2SSx + W2*(1-w2FracP1)) - stdDed);
    const taxesW2 = isMFS ? bracketTax(p1TaxableWW2, curBrackets) + bracketTax(p2TaxableWW2, curBrackets)
                          : bracketTax(totTaxableW2, curBrackets);
    const ordTaxActual = taxesW2-baseTaxes;
    const net2 = W2-ordTaxActual, remNet2 = Math.max(0, remNet1-net2);

    // W3 roth
    const W3 = Math.min(remNet2, B3);

    const extraTaxes = cgTaxActual+ordTaxActual;
    const totalTaxable = Math.max(0, taxableGross+W2-stdDed);
    const stateTax = totalTaxable*I.stateTax;
    const totalTaxes = baseTaxes+extraTaxes+stateTax;
    const fundingReq = Math.max(0, wTotal+chosenExtra+totalTaxes-totalGross);
    const surplus = Math.max(0, totalGross-(wTotal+chosenExtra+totalTaxes));

    // disbursement allocation per account
    const dDisc = remBals.map((b,i)=> gsR(
      (effH[i]===1?(B1? b/B1*W1:0):0)+(effH[i]===2?(B2? b/B2*W2:0):0)+(effH[i]===3?(B3? b/B3*W3:0):0)));
    const D = prevBals.map((b,i)=> gsR(forcedW[i]+dDisc[i]));

    // reinvested RMDs + conversion destinations (basis tracking)
    const reinvRMD = Math.max(0, totalRMD-fundingReq);
    const reinvC = Math.round(totalRMD>0? reinvRMD*(rmdC/totalRMD):0);
    const reinvG = Math.round(totalRMD>0? reinvRMD*(rmdG/totalRMD):0);

        <p style="margin:0 0 14px;">Monte Carlo is the method the major retirement planners use to answer one question: <b>how often does your plan actually work?</b> Here is how the established tools do it &mdash; and exactly where this one matches them and where it goes further.</p>

        <div style="font-size:11px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--good);margin:0 0 7px;">The standard &mdash; and where we meet it</div>
        <ul style="margin:0 0 15px;padding-left:18px;">
          <li style="margin-bottom:7px;"><b>Thousands of runs.</b> Empower runs 5,000 scenarios; Boldin and T.&nbsp;Rowe Price run 1,000. <b style="color:var(--good);">This tool runs up to 5,000</b> &mdash; Empower&rsquo;s number.</li>
          <li style="margin-bottom:7px;"><b>A fresh random return every year.</b> That is what captures sequence-of-returns risk &mdash; a bad market early in retirement. <b style="color:var(--good);">We do this</b>, and report it the same way they do: the share of futures that finish with money left, plus the 10th / 50th / 90th percentile bands.</li>
          <li><b>Volatility matched to your real mix.</b> A balanced portfolio swings less than an all-stock one. <b style="color:var(--good);">We scale it from 6% (all bonds) up to 18% (all stocks)</b> based on your actual allocation &mdash; the same allocation-based approach Empower uses, not a one-size number.</li>
        </ul>

        <div style="font-size:11px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:#b07d1f;margin:0 0 7px;">Where this goes further than the typical tool</div>
        <ul style="margin:0 0 15px;padding-left:18px;">
          <li style="margin-bottom:7px;"><b>Fat-tailed returns.</b> A plain bell-curve model under-counts real crashes; this one injects rare, severe down years on purpose.</li>
          <li style="margin-bottom:7px;"><b>Volatility-drag correction.</b> A geometric adjustment so compounding is honest, never flattered.</li>
          <li style="margin-bottom:7px;"><b>Variable inflation every run.</b> Spending and Social Security COLA float with a random inflation path instead of a fixed rate &mdash; the differentiator the newest tools added.</li>
          <li><b>Guyton-Klinger spending guardrails.</b> The dynamic-spending rule that trims discretionary spending when your withdrawal rate runs hot &mdash; what real retirees and advisors actually do.</li>
        </ul>

        <p style="margin:0;padding-top:13px;border-top:1px solid var(--line);font-size:11px;color:var(--mut);line-height:1.65;">Credit where it is due: the simulation standard is set by tools like <b>Empower</b>, <b>Boldin</b>, and <b>T.&nbsp;Rowe Price</b>; the spending-guardrails rule is the work of financial-planning researchers <b>Jonathan Guyton</b> and <b>William Klinger</b> (2006). This tool follows that standard and adds the extra rigor above.</p>
