   On the LIVE site, reload once through a unique URL on open so the browser fetches the

   so the page still renders for review. Existing params are kept; the cb check stops loops. */
(function(){
  try{
    var h = window.location.hostname || '';
    if (window.location.protocol==='file:' || h==='' || h==='localhost' || h.indexOf('claude.ai')>=0) return;

    if (s.indexOf('cb=') === -1) {
      var sep = s ? '&' : '?';
      window.location.replace(window.location.pathname + s + sep + 'cb=' + Date.now() + (window.location.hash || ''));
    }
  }catch(e){}
})();
</script>
